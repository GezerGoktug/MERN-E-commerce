[build]
  command = "pnpm install && pnpm build"
  publish = "dist"

[[redirects]]
  from = "/admin/*"
  to = "/admin/index.html"
  status = 200

# Checkout app routes served from /checkout/index.html (assets at /checkout/)
[[redirects]]
  from = "/cart"
  to = "/checkout/index.html"
  status = 200

[[redirects]]
  from = "/place-order"
  to = "/checkout/index.html"
  status = 200

[[redirects]]
  from = "/payment/result"
  to = "/checkout/index.html"
  status = 200

[[redirects]]
  from = "/checkout/*"
  to = "/checkout/index.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200