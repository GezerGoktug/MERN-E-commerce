[build]
  command = "pnpm install && pnpm build"
  publish = "dist"

[[redirects]]
  from = "/admin-assets/*"
  to = "/admin/admin-assets/:splat"
  status = 200

[[redirects]]
  from = "/main-assets/*"
  to = "/main/main-assets/:splat"
  status = 200

[[redirects]]
  from = "/admin/*"
  to = "/admin/index.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/main/index.html"
  status = 200